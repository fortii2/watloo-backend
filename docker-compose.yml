services:
  watloo-bot:
    image: ${WATLOO_IMAGE:-ghcr.io/fortii2/waterloo-backend:latest}
    container_name: watloo-bot
    restart: always

    ports:
      - "127.0.0.1:8080:8080"

    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - WATERLOO_OPEN_KEY=${WATERLOO_OPEN_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}

    volumes:
      - ./data:/app/data

    deploy:
      resources:
        limits:
          memory: 800M