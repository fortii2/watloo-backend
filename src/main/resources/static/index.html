<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watloo Demo Console</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f5f7fb; color: #1f2937; }
    .wrap { max-width: 980px; margin: 28px auto; padding: 0 16px; }
    .title { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
    .sub { color: #6b7280; margin-bottom: 20px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 14px; box-shadow: 0 1px 2px rgba(0,0,0,.03); }
    .card h3 { margin: 0 0 10px 0; font-size: 17px; }
    .muted { color: #6b7280; font-size: 13px; margin-bottom: 10px; }
    button { background: #2563eb; color: #fff; border: 0; border-radius: 8px; padding: 8px 12px; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    input { width: 100%; border: 1px solid #d1d5db; border-radius: 8px; padding: 8px 10px; margin-bottom: 8px; }
    pre { margin: 10px 0 0; background: #0b1020; color: #b6f4c7; padding: 10px; border-radius: 8px; overflow: auto; font-size: 12px; min-height: 80px; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    th, td { border-bottom: 1px solid #e5e7eb; text-align: left; padding: 8px; font-size: 13px; }
    .full { grid-column: 1 / -1; }
    .ok { color: #059669; font-weight: 600; }
    .err { color: #dc2626; font-weight: 600; }
    @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">Watloo 可视化验收页</div>
    <div class="sub">Spring Boot 后端演示（状态 / 学期数据 / AI指令校验）</div>
    <div class="grid">
      <div class="card">
        <h3>系统状态</h3>
        <div class="muted">接口：GET /api/demo/status</div>
        <button onclick="loadStatus()">刷新状态</button>
        <pre id="statusBox">等待加载...</pre>
      </div>
      <div class="card">
        <h3>可用指令</h3>
        <div class="muted">接口：GET /api/demo/commands</div>
        <button onclick="loadCommands()">读取指令</button>
        <pre id="commandsBox">等待加载...</pre>
      </div>
      <div class="card full">
        <h3>AI 指令校验</h3>
        <div class="muted">接口：GET /api/demo/check?input=...</div>
        <input id="commandInput" value="/stars Jan18" />
        <button onclick="checkCommand()">执行校验</button>
        <pre id="checkBox">等待输入...</pre>
      </div>
      <div class="card full">
        <h3>近期学期（Waterloo Open Data）</h3>
        <div class="muted">接口：GET /api/demo/terms</div>
        <button onclick="loadTerms()">刷新学期</button>
        <table>
          <thead>
            <tr><th>termCode</th><th>name</th><th>termBeginDate</th><th>termEndDate</th></tr>
          </thead>
          <tbody id="termsBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    async function getJson(url) {
      const r = await fetch(url);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return await r.json();
    }

    function pretty(obj) {
      return JSON.stringify(obj, null, 2);
    }

    async function loadStatus() {
      const box = document.getElementById('statusBox');
      box.textContent = '加载中...';
      try {
        const data = await getJson('/api/demo/status');
        box.textContent = pretty(data);
      } catch (e) {
        box.textContent = '加载失败: ' + e.message;
      }
    }

    async function loadCommands() {
      const box = document.getElementById('commandsBox');
      box.textContent = '加载中...';
      try {
        const data = await getJson('/api/demo/commands');
        box.textContent = pretty(data);
      } catch (e) {
        box.textContent = '加载失败: ' + e.message;
      }
    }

    async function checkCommand() {
      const input = document.getElementById('commandInput').value || '';
      const box = document.getElementById('checkBox');
      box.textContent = '校验中...';
      try {
        const data = await getJson('/api/demo/check?input=' + encodeURIComponent(input));
        box.textContent = pretty(data);
      } catch (e) {
        box.textContent = '校验失败: ' + e.message;
      }
    }

    async function loadTerms() {
      const body = document.getElementById('termsBody');
      body.innerHTML = '<tr><td colspan="4">加载中...</td></tr>';
      try {
        const list = await getJson('/api/demo/terms');
        if (!Array.isArray(list) || list.length === 0) {
          body.innerHTML = '<tr><td colspan="4">暂无数据</td></tr>';
          return;
        }
        body.innerHTML = list.map(t => `<tr>
          <td>${t.termCode ?? ''}</td>
          <td>${t.name ?? ''}</td>
          <td>${t.termBeginDate ?? ''}</td>
          <td>${t.termEndDate ?? ''}</td>
        </tr>`).join('');
      } catch (e) {
        body.innerHTML = `<tr><td colspan="4">加载失败: ${e.message}</td></tr>`;
      }
    }

    loadStatus();
    loadCommands();
    loadTerms();
  </script>
</body>
</html>
